<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="420" viewBox="0 0 1400 420" role="img" aria-labelledby="title desc">
  <title id="title">Content-based music recommender scoring flow</title>
  <desc id="desc">Optional user preferences and a 15-field song catalog feed similarity calculations, revised feature weights, active-weight normalization, ranking, and explained recommendations.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .box { stroke-width: 2; rx: 14; }
      .heading { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .body { font: 14px Arial, sans-serif; fill: #1e293b; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #475569; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="420" fill="#f8fafc"/>
  <text x="700" y="28" text-anchor="middle" class="heading">Content-Based Recommendation Flow</text>

  <rect class="box" x="35" y="52" width="315" height="142" fill="#dbeafe" stroke="#2563eb"/>
  <text x="192" y="80" text-anchor="middle" class="heading">Optional User Preferences</text>
  <text x="55" y="108" class="body">
    <tspan x="55" dy="0">Categories: genre and mood</tspan>
    <tspan x="55" dy="22">Audio: energy, tempo, valence, danceability,</tspan>
    <tspan x="55" dy="20">acousticness, instrumentalness, liveness</tspan>
    <tspan x="55" dy="22">Context: year, duration, popularity</tspan>
  </text>

  <rect class="box" x="35" y="230" width="315" height="112" fill="#e0f2fe" stroke="#0284c7"/>
  <text x="192" y="260" text-anchor="middle" class="heading">Song Catalog</text>
  <text x="192" y="288" text-anchor="middle" class="body">60 songs and 15 fields</text>
  <text x="192" y="314" text-anchor="middle" class="body">12 preference-bearing features</text>

  <rect class="box" x="410" y="100" width="270" height="170" fill="#fef3c7" stroke="#d97706"/>
  <text x="545" y="130" text-anchor="middle" class="heading">Calculate Similarities</text>
  <text x="430" y="160" class="body">
    <tspan x="430" dy="0">Exact category = 1.0</tspan>
    <tspan x="430" dy="24">Related category = 0.5</tspan>
    <tspan x="430" dy="24">Unrelated category = 0.0</tspan>
    <tspan x="430" dy="24">Numeric = normalized distance</tspan>
  </text>

  <rect class="box" x="750" y="72" width="315" height="225" fill="#dcfce7" stroke="#16a34a"/>
  <text x="907" y="102" text-anchor="middle" class="heading">Apply Revised Weights</text>
  <text x="775" y="132" class="small">
    <tspan x="775" dy="0">Genre 18% | Mood 18% | Energy 11%</tspan>
    <tspan x="775" dy="24">Tempo 7% | Valence 7% | Danceability 7%</tspan>
    <tspan x="775" dy="24">Acousticness 7% | Instrumentalness 6%</tspan>
    <tspan x="775" dy="24">Liveness 5% | Release year 5%</tspan>
    <tspan x="775" dy="24">Duration 4% | Popularity 5%</tspan>
    <tspan x="775" dy="30" font-weight="700">Total when all active: 100%</tspan>
  </text>

  <rect class="box" x="1130" y="48" width="230" height="82" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="1245" y="79" text-anchor="middle" class="heading">Renormalize</text>
  <text x="1245" y="106" text-anchor="middle" class="body">Use active preferences only</text>

  <rect class="box" x="1130" y="164" width="230" height="82" fill="#f3e8ff" stroke="#9333ea"/>
  <text x="1245" y="195" text-anchor="middle" class="heading">Rank</text>
  <text x="1245" y="222" text-anchor="middle" class="body">Sort scores highest first</text>

  <rect class="box" x="1130" y="280" width="230" height="92" fill="#ede9fe" stroke="#7c3aed"/>
  <text x="1245" y="312" text-anchor="middle" class="heading">Return Top K</text>
  <text x="1245" y="339" text-anchor="middle" class="body">Scores plus explanations</text>

  <path class="arrow" d="M350 123 C380 123, 380 150, 410 150"/>
  <path class="arrow" d="M350 286 C380 286, 380 222, 410 222"/>
  <path class="arrow" d="M680 185 L750 185"/>
  <path class="arrow" d="M1065 150 C1100 150, 1095 89, 1130 89"/>
  <path class="arrow" d="M1245 130 L1245 164"/>
  <path class="arrow" d="M1245 246 L1245 280"/>
</svg>
